<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>健康知識格鬥賽 - 遠程攻擊速度修正版</title>
    <style>
        /* 基礎風格設定 */
        body { background: #111; color: white; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 1. 初始命名畫面 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex; align-items: center;
            justify-content: center; z-index: 100; text-align: center;
        }
        .start-content {
            background: #333; padding: 40px; border: 4px solid #ffcc00; border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
        }
        #player-name-input {
            padding: 12px; font-size: 20px; border-radius: 5px; border: none; width: 250px; 
            text-align: center; margin-bottom: 20px; outline: none;
        }

        /* 2. 戰鬥舞台 */
        #stage { 
            width: 800px; height: 400px; 
            background-image: url('background.png'); 
            background-size: cover; background-position: center;
            border: 4px solid #555; position: relative; 
            display: none; justify-content: space-between; align-items: flex-end; padding: 20px; box-sizing: border-box; 
        }
        
        /* 頂部 UI：血條與計時器 */
        .health-container { position: absolute; top: 20px; width: 300px; z-index: 10; }
        #player-ui { left: 20px; }
        #enemy-ui { right: 20px; text-align: right; }
        .hp-bar { width: 100%; height: 20px; background: #500; border: 2px solid #fff; margin-top: 5px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: #0f0; transition: width 0.3s; box-shadow: 0 0 10px #0f0; }

        #timer { 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); 
            font-size: 60px; color: #ffcc00; font-family: "OCR A Extended", monospace; font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.8);
        }
        .timer-low { color: #ff0000 !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 角色與投擲物 */
        .character { width: 200px; height: 250px; position: relative; background-size: contain; background-repeat: no-repeat; background-position: bottom center; transition: transform 0.1s; }
        #player { background-image: url('player.png'); left: 0px; }
        #enemy { background-image: url('boss.png'); right: 0px; }
        
        #projectile {
            position: absolute; width: 60px; height: 60px;
            background-size: contain; background-repeat: no-repeat;
            display: none; z-index: 15; pointer-events: none;
        }

        /* 戰鬥文字回饋 */
        #battle-text { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); font-size: 45px; font-weight: bold; opacity: 0; z-index: 40; pointer-events: none; }
        #ko-text { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); font-size: 60px; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; z-index: 50; opacity: 0; font-weight: bold; }

        /* 動畫效果 */
        .player-attack { animation: shake 0.3s; }
        .enemy-attack { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        /* 飛行效果：稍微加一點點弧度 (Y軸位移)，讓慢速飛行更有丟東西的感覺 */
        @keyframes fly-right { 
            0% { transform: translateX(100px) translateY(0) rotate(0deg); opacity: 1; } 
            50% { transform: translateX(300px) translateY(-30px) rotate(180deg); opacity: 1; } /* 飛行中段稍微上升 */
            100% { transform: translateX(500px) translateY(0) rotate(360deg); opacity: 0; } 
        }
        @keyframes fly-left { 
            0% { transform: translateX(-100px) translateY(0) rotate(0deg); opacity: 1; } 
            50% { transform: translateX(-300px) translateY(-30px) rotate(-180deg); opacity: 1; } /* 飛行中段稍微上升 */
            100% { transform: translateX(-500px) translateY(0) rotate(-360deg); opacity: 0; } 
        }

        .battle-text-pop { animation: battle-text-pop 0.8s ease-out; }
        @keyframes battle-text-pop { 0% { opacity: 0; transform: translate(-50%, 0); } 20% { opacity: 1; transform: translate(-50%, -30px); } 100% { opacity: 0; transform: translate(-50%, -60px); } }

        /* 題目區 */
        #quiz-box { width: 800px; background: #333; border: 4px solid #555; padding: 25px; box-sizing: border-box; text-align: center; margin-top: 10px; display: none; }
        .options { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        button { padding: 12px 30px; font-size: 20px; cursor: pointer; border: none; background: #eee; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ffcc00; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="start-content">
            <h1 style="color: #ffcc00; margin-bottom: 10px;">HEALTH FIGHTER</h1>
            <p style="margin-bottom: 20px;">系統已就緒，請輸入戰士代號：</p>
            <input type="text" id="player-name-input" placeholder="輸入名字..." maxlength="10">
            <br>
            <button onclick="startGame()">進入戰場</button>
        </div>
    </div>

    <div id="stage">
        <div class="health-container" id="player-ui">
            <div id="display-player-name" style="font-weight: bold; color: #3498db;">健康戰士</div>
            <div class="hp-bar"><div id="player-hp" class="hp-fill"></div></div>
        </div>
        <div class="health-container" id="enemy-ui">
            <div style="font-weight: bold; color: #e74c3c;">甜點星人</div>
            <div class="hp-bar"><div id="enemy-hp" class="hp-fill" style="background: #f00;"></div></div>
        </div>

        <div id="timer">7</div>
        <div id="ko-text">K.O.!</div>

        <div id="player" class="character"></div>
        <div id="enemy" class="character"></div>
        <div id="projectile"></div>
        <div id="battle-text"></div>
    </div>

    <div id="quiz-box">
        <h2 id="question-text" style="margin: 0;">載入題目中...</h2>
        <div class="options">
            <button onclick="handleBtnClick(0)" id="opt0">選項 A</button>
            <button onclick="handleBtnClick(1)" id="opt1">選項 B</button>
        </div>
    </div>

<script>
    // 1. 完整隨機題庫
    const quizData = [
        { q: "成人每日建議飲水量是體重乘以多少？", options: ["30-35cc", "10-15cc"], correct: 0, move: "水之波導！" },
        { q: "攝取過多手搖飲，最直接影響的健康指標是？", options: ["視力", "血糖與體脂"], correct: 1, move: "數據淨化！" },
        { q: "長期『久坐』對身體最明顯的危害是？", options: ["心肺功能下降", "頭髮變長"], correct: 0, move: "深蹲反擊！" },
        { q: "使用電腦/手機 30 分鐘，建議遠眺休息多久？", options: ["1 分鐘", "10 分鐘"], correct: 1, move: "視力修復！" },
        { q: "配戴 AI 智能眼鏡時，若感到頭暈應？", options: ["繼續配戴直到適應", "立即取下休息"], correct: 1, move: "系統修復！" },
        { q: "當感到高度壓力時，哪種方式有助於快速放鬆？", options: ["深呼吸練習", "憋氣"], correct: 0, move: "正念衝擊！" },
        { q: "良好的社交互動對心理健康有幫助嗎？", options: ["是的", "沒有任何關係"], correct: 0, move: "友誼之光！" }
    ];

    let playerHP = 100;
    let enemyHP = 100;
    let currentQuizIndex = 0;
    let timeLeft = 7;
    let timerInterval;
    let playerName = "";

    const questionEl = document.getElementById('question-text');
    const playerEl = document.getElementById('player');
    const enemyEl = document.getElementById('enemy');
    const projectileEl = document.getElementById('projectile');
    const battleTextEl = document.getElementById('battle-text');
    const koTextEl = document.getElementById('ko-text');
    const timerEl = document.getElementById('timer');

    // 啟動遊戲
    function startGame() {
        const nameInput = document.getElementById('player-name-input').value;
        playerName = nameInput.trim() === "" ? "健康戰士" : nameInput;
        document.getElementById('display-player-name').innerText = playerName;
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('stage').style.display = 'flex';
        document.getElementById('quiz-box').style.display = 'block';
        
        resetGame();
    }

    // 單題計時邏輯
    function startQuestionTimer() {
        clearInterval(timerInterval);
        timeLeft = 7;
        timerEl.innerText = timeLeft;
        timerEl.classList.remove('timer-low');

        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 3) timerEl.classList.add('timer-low');
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processResult(false, "時間到！被反擊！");
            }
        }, 1000);
    }

    function loadQuiz() {
        if (playerHP <= 0 || enemyHP <= 0) return;
        const q = quizData[currentQuizIndex];
        questionEl.innerText = q.q;
        document.getElementById('opt0').innerText = q.options[0];
        document.getElementById('opt1').innerText = q.options[1];
        startQuestionTimer();
    }

    function handleBtnClick(choice) {
        if (timeLeft <= 0 || playerHP <= 0 || enemyHP <= 0) return;
        clearInterval(timerInterval);
        const q = quizData[currentQuizIndex];
        const isCorrect = (choice === q.correct);
        processResult(isCorrect, isCorrect ? q.move : "糟糕！受傷了！");
    }

    function processResult(isCorrect, msg) {
        // --- 核心修改 1：配合飛行速度，調整受傷扣血和下一題的延遲 ---
        if (isCorrect) {
            // 答對了，先丟東西，延遲扣血，呈現「擊中」感覺
            playerEl.classList.add('player-attack');
            launchProjectile('player');
            setTimeout(() => { enemyHP -= 20; updateUI(); }, 1200); // 配合飞行时间1.2s扣血
            showBattleText(msg, "#0f0");
        } else {
            // 答錯了，魔王丟東西，玩家延遲扣血
            enemyEl.classList.add('enemy-attack');
            launchProjectile('enemy');
            setTimeout(() => { playerHP -= 20; updateUI(); }, 1200); // 配合飞行时间1.2s扣血
            showBattleText(msg, "#f00");
        }

        setTimeout(() => {
            playerEl.classList.remove('player-attack');
            enemyEl.classList.remove('enemy-attack');
        }, 300);

        // --- 核心修改 2：跳下一題的延遲時間加長，確保飛完、扣完血後才跳 ---
        if (playerHP > 0 && enemyHP > 0) {
            currentQuizIndex = (currentQuizIndex + 1) % quizData.length;
            setTimeout(loadQuiz, 2000); // 加長到2秒後才載入新題目，讓受試者有時間感受打擊感
        }
    }

    function launchProjectile(attacker) {
        projectileEl.style.display = 'block';
        projectileEl.style.animation = 'none';
        void projectileEl.offsetWidth; 

        // --- 核心修改 3：將飛行時間從 0.5s 改為 1.2s，增加拋物線視覺效果 (在CSS定) ---
        if (attacker === 'player') {
            projectileEl.style.backgroundImage = "url('item_good.png')";
            projectileEl.style.left = '200px'; projectileEl.style.right = 'auto';
            projectileEl.style.bottom = '150px';
            projectileEl.style.animation = 'fly-right 1.2s forwards'; // 改為 1.2s
        } else {
            projectileEl.style.backgroundImage = "url('item_bad.png')";
            projectileEl.style.right = '200px'; projectileEl.style.left = 'auto';
            projectileEl.style.bottom = '150px';
            projectileEl.style.animation = 'fly-left 1.2s forwards'; // 改為 1.2s
        }
        // 配合新的飛行時間，在 1.2s 後隱藏投擲物
        setTimeout(() => projectileEl.style.display = 'none', 1200); 
    }

    function showBattleText(text, color) {
        battleTextEl.innerText = text;
        battleTextEl.style.color = color;
        battleTextEl.style.textShadow = `0 0 15px ${color}`;
        battleTextEl.classList.add('battle-text-pop');
        setTimeout(() => {
            battleTextEl.classList.remove('battle-text-pop');
        }, 800);
    }

    // 將 updateUI 從扣血邏輯中獨立出來，方便延遲呼叫
    function updateUI() {
        document.getElementById('player-hp').style.width = playerHP + "%";
        document.getElementById('enemy-hp').style.width = enemyHP + "%";

        if (enemyHP <= 0 || playerHP <= 0) {
            clearInterval(timerInterval);
            koTextEl.innerText = enemyHP <= 0 ? "K.O.! 健康獲勝！" : "妳被打敗了...";
            koTextEl.style.opacity = 1;
            setTimeout(resetGame, 3000);
        }
    }

    function resetGame() {
        playerHP = 100; enemyHP = 100;
        koTextEl.style.opacity = 0;
        currentQuizIndex = 0;
        quizData.sort(() => Math.random() - 0.5); // 隨機題庫
        updateUI(); // 確保重置時HP bar也重置
        // 這裡不需要立即 loadQuiz，因為 loadQuiz 裡有 startTimer，會造成命名畫面開始計時
        // 應由 startGame 呼叫 resetGame -> loadQuiz -> startTimer
    }
</script>
</body>
</html>
