<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>健康知識格鬥賽</title>
    <style>
        body { background: #111; color: white; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .start-content { background: #333; padding: 40px; border: 4px solid #ffcc00; border-radius: 15px; box-shadow: 0 0 30px rgba(255, 204, 0, 0.5); }
        #player-name-input { padding: 12px; font-size: 20px; border-radius: 5px; border: none; width: 250px; text-align: center; margin-bottom: 20px; outline: none; }

        #stage { width: 800px; height: 400px; background-image: url('background.png'); background-size: cover; background-position: center; border: 4px solid #555; position: relative; display: none; justify-content: space-between; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        
        .health-container { position: absolute; top: 20px; width: 300px; z-index: 10; }
        #player-ui { left: 20px; }
        #enemy-ui { right: 20px; text-align: right; }
        .hp-bar { width: 100%; height: 20px; background: #500; border: 2px solid #fff; margin-top: 5px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: #0f0; transition: width 0.3s; box-shadow: 0 0 10px #0f0; }

        #timer { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 60px; color: #ffcc00; font-family: "OCR A Extended", monospace; font-weight: bold; text-shadow: 0 0 15px rgba(255, 204, 0, 0.8); }

        .character { width: 200px; height: 250px; position: relative; background-size: contain; background-repeat: no-repeat; background-position: bottom center; transition: transform 0.1s; }
        #player { background-image: url('player.png'); left: 0px; }
        #enemy { background-image: url('boss.png'); right: 0px; }
        #projectile { position: absolute; width: 60px; height: 60px; background-size: contain; background-repeat: no-repeat; display: none; z-index: 15; }

        #battle-text { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); font-size: 45px; font-weight: bold; opacity: 0; z-index: 40; pointer-events: none; }
        #ko-text { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); font-size: 60px; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; z-index: 50; opacity: 0; font-weight: bold; }

        .player-attack { animation: shake 0.3s; }
        .enemy-attack { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        @keyframes fly-right { 0% { transform: translateX(100px) translateY(0) rotate(0deg); opacity: 1; } 50% { transform: translateX(300px) translateY(-30px) rotate(180deg); opacity: 1; } 100% { transform: translateX(500px) translateY(0) rotate(360deg); opacity: 0; } }
        @keyframes fly-left { 0% { transform: translateX(-100px) translateY(0) rotate(0deg); opacity: 1; } 50% { transform: translateX(-300px) translateY(-30px) rotate(-180deg); opacity: 1; } 100% { transform: translateX(-500px) translateY(0) rotate(-360deg); opacity: 0; } }

        .battle-text-pop { animation: battle-text-pop 0.6s ease-out; }
        @keyframes battle-text-pop { 0% { opacity: 0; transform: translate(-50%, 0); } 20% { opacity: 1; transform: translate(-50%, -20px); } 100% { opacity: 0; transform: translate(-50%, -40px); } }

        #quiz-box { width: 800px; background: #333; border: 4px solid #555; padding: 25px; box-sizing: border-box; text-align: center; margin-top: 10px; display: none; }
        .options { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        button { padding: 12px 30px; font-size: 20px; cursor: pointer; border: none; background: #eee; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ffcc00; transform: scale(1.05); }
        .timer-low { color: #ff0000 !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="start-content">
            <h1 style="color: #ffcc00;">HEALTH FIGHTER</h1>
            <p>請輸入代號並按下按鈕（題目將立即載入）：</p>
            <input type="text" id="player-name-input" placeholder="輸入名字..." maxlength="10">
            <br>
            <button onclick="startGame()">進入戰場</button>
        </div>
    </div>

    <div id="stage">
        <div class="health-container" id="player-ui">
            <div id="display-player-name" style="font-weight: bold; color: #3498db;">健康戰士</div>
            <div class="hp-bar"><div id="player-hp" class="hp-fill"></div></div>
        </div>
        <div class="health-container" id="enemy-ui">
            <div style="font-weight: bold; color: #e74c3c;">亞健康魔王</div>
            <div class="hp-bar"><div id="enemy-hp" class="hp-fill" style="background: #f00;"></div></div>
        </div>
        <div id="timer">7</div>
        <div id="ko-text">K.O.!</div>
        <div id="player" class="character"></div>
        <div id="enemy" class="character"></div>
        <div id="projectile"></div>
        <div id="battle-text"></div>
    </div>

    <div id="quiz-box">
        <h2 id="question-text">準備中...</h2>
        <div class="options">
            <button onclick="handleBtnClick(0)" id="opt0">選項 A</button>
            <button onclick="handleBtnClick(1)" id="opt1">選項 B</button>
        </div>
    </div>

<script>
   const quizData = [
        // --- 1. 營養與生理基礎 ---
        { q: "成人每日建議飲水量是體重(kg)乘以多少？", options: ["30-35cc", "10-15cc"], correct: 0, move: "水之波導！" },
        { q: "攝取過多手搖飲，最直接影響的健康指標是？", options: ["視力衰退", "血糖與體脂"], correct: 1, move: "數據淨化！" },
        { q: "哪種營養素是人體組織修復與肌肉合成的主要來源？", options: ["蛋白質", "單糖類"], correct: 0, move: "肌肉強化！" },

        // --- 2. 生活習慣與亞健康 ---
        { q: "長期『久坐』對身體最明顯的危害是？", options: ["心肺與代謝下降", "頭髮生長變慢"], correct: 0, move: "深蹲反擊！" },
        { q: "世界衛生組織建議，成年人每週應至少進行多少分鐘的中強度運動？", options: ["150 分鐘", "30 分鐘"], correct: 0, move: "有氧衝擊！" },
        { q: "為了維持良好的睡眠規律，睡前一小時應盡量避免？", options: ["藍光螢幕刺激", "喝溫白開水"], correct: 0, move: "安眠護盾！" },

        // --- 3. 數位健康與 AI 互動 (妳的研究核心) ---
        { q: "護眼『20-20-20』原則是指用眼 20 分鐘後，應遠眺 20 英呎處幾秒？", options: ["60 秒", "20 秒"], correct: 1, move: "視力修復！" },
        { q: "配戴 AI 智能眼鏡若產生視覺暈眩(Cyber-Sickness)，首要措施是？", options: ["立即取下並休息", "閉上眼睛繼續戴"], correct: 0, move: "系統修復！" },
        { q: "在使用 AI 助理時，為了保護隱私，何種資訊不建議主動揭露？", options: ["個人帳務密碼", "當下的心情"], correct: 0, move: "數據防火牆！" },

        // --- 4. 心理健康 ---
        { q: "當感到高度情緒壓力時，哪種行為有助於活化副交感神經以放鬆？", options: ["深長的腹式呼吸", "快速連續憋氣"], correct: 0, move: "正念衝擊！" }
    ];

    let playerHP = 100, enemyHP = 100, currentQuizIndex = 0, timeLeft = 7, timerInterval;

    function startGame() {
        const nameInput = document.getElementById('player-name-input').value;
        document.getElementById('display-player-name').innerText = nameInput.trim() === "" ? "健康戰士" : nameInput;
        
        // --- 核心優化：先顯示畫面，再立即載入題目 ---
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('stage').style.display = 'flex';
        document.getElementById('quiz-box').style.display = 'block';
        
        // 直接執行，不使用任何延遲
        quizData.sort(() => Math.random() - 0.5);
        currentQuizIndex = 0;
        playerHP = 100;
        enemyHP = 100;
        updateUI();
        loadQuiz(); 
    }

    function loadQuiz() {
        if (playerHP <= 0 || enemyHP <= 0) return;
        const q = quizData[currentQuizIndex];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('opt0').innerText = q.options[0];
        document.getElementById('opt1').innerText = q.options[1];
        
        // 題目出現後立即啟動計時
        startQuestionTimer();
    }

    function startQuestionTimer() {
        clearInterval(timerInterval);
        timeLeft = 7;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('timer').classList.remove('timer-low');
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 3) document.getElementById('timer').classList.add('timer-low');
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processResult(false, "時間到！");
            }
        }, 1000);
    }

    function handleBtnClick(choice) {
        if (timeLeft <= 0 || playerHP <= 0 || enemyHP <= 0) return;
        clearInterval(timerInterval);
        const q = quizData[currentQuizIndex];
        processResult(choice === q.correct, choice === q.correct ? q.move : "糟糕！");
    }

    function processResult(isCorrect, msg) {
        if (isCorrect) {
            document.getElementById('player').classList.add('player-attack');
            launchProjectile('player');
            setTimeout(() => { enemyHP -= 20; updateUI(); }, 800);
            showBattleText(msg, "#0f0");
        } else {
            document.getElementById('enemy').classList.add('enemy-attack');
            launchProjectile('enemy');
            setTimeout(() => { playerHP -= 20; updateUI(); }, 800);
            showBattleText(msg, "#f00");
        }
        
        setTimeout(() => {
            document.getElementById('player').classList.remove('player-attack');
            document.getElementById('enemy').classList.remove('enemy-attack');
        }, 300);

        if (playerHP > 0 && enemyHP > 0) {
            currentQuizIndex = (currentQuizIndex + 1) % quizData.length;
            setTimeout(loadQuiz, 1000);
        }
    }

    function launchProjectile(attacker) {
        const p = document.getElementById('projectile');
        p.style.display = 'block'; p.style.animation = 'none'; void p.offsetWidth; 
        if (attacker === 'player') {
            p.style.backgroundImage = "url('item_good.png')";
            p.style.left = '200px'; p.style.right = 'auto'; p.style.bottom = '150px';
            p.style.animation = 'fly-right 0.8s forwards';
        } else {
            p.style.backgroundImage = "url('item_bad.png')";
            p.style.right = '200px'; p.style.left = 'auto'; p.style.bottom = '150px';
            p.style.animation = 'fly-left 0.8s forwards';
        }
        setTimeout(() => p.style.display = 'none', 800);
    }

    function showBattleText(text, color) {
        const b = document.getElementById('battle-text');
        b.innerText = text; b.style.color = color; b.style.textShadow = `0 0 15px ${color}`;
        b.classList.add('battle-text-pop');
        setTimeout(() => b.classList.remove('battle-text-pop'), 600);
    }

    function updateUI() {
        document.getElementById('player-hp').style.width = playerHP + "%";
        document.getElementById('enemy-hp').style.width = enemyHP + "%";
        if (enemyHP <= 0 || playerHP <= 0) {
            clearInterval(timerInterval);
            document.getElementById('ko-text').innerText = enemyHP <= 0 ? "K.O.! 健康獲勝！" : "妳被打敗了...";
            document.getElementById('ko-text').style.opacity = 1;
            setTimeout(() => {
                location.reload(); // 結束後直接重載網頁，保持最乾淨的狀態
            }, 3000);
        }
    }
</script>
</body>
</html>
